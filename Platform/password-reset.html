<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Agro and More Admin</title>
<link rel="icon" type="image/png" sizes="32x32" href="brand/favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#001524;--teal:#15616D;--cream:#FFECD1;--orange:#FF7D00;--rust:#78290F}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:14px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,21,36,.14);overflow:hidden}
.card-top{background:var(--ink);padding:24px;text-align:center}
.card-top img{height:30px;filter:brightness(0) invert(1);margin:0 auto 12px}
.card-top h1{font-family:'Poppins';font-size:22px;font-weight:800;color:#fff}
.card-top p{font-size:12.5px;color:rgba(255,236,209,.7);margin-top:6px}
.card-body{padding:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink);margin-bottom:5px}
.field label .req{color:var(--rust)}
.field input{width:100%;border:1.5px solid rgba(0,21,36,.12);border-radius:8px;padding:11px 14px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;transition:border-color .15s}
.field input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,125,0,.1)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink);opacity:.4;padding:4px}
.pw-toggle:hover{opacity:.8}
.strength{height:4px;border-radius:2px;margin-top:6px;background:#eee;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}
.strength-lbl{font-size:10.5px;color:var(--ink);opacity:.5;margin-top:4px}
.btn{width:100%;height:46px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.btn:hover{background:#E06F00}
.btn:disabled{opacity:.55;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .spinner{display:block}
.btn.loading .btn-txt{display:none}
.alert{padding:11px 14px;border-radius:8px;font-size:12.5px;font-weight:600;margin-bottom:14px;display:none}
.alert.show{display:block}
.alert.err{background:rgba(120,41,15,.1);color:var(--rust);border:1px solid rgba(120,41,15,.18)}
.alert.ok{background:rgba(21,97,109,.1);color:var(--teal);border:1px solid rgba(21,97,109,.18)}
.back{text-align:center;margin-top:16px;font-size:12.5px}
.back a{color:var(--teal);font-weight:600;text-decoration:none}
.back a:hover{text-decoration:underline}
/* Success state */
.success-view{display:none;text-align:center;padding:8px 0}
.success-view .icon{width:56px;height:56px;background:rgba(21,97,109,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.success-view .icon svg{width:26px;height:26px;color:var(--teal)}
.success-view h3{font-family:'Poppins';font-size:18px;font-weight:800;margin-bottom:8px}
.success-view p{font-size:13px;color:rgba(0,21,36,.6);margin-bottom:20px}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <img src="brand/agmore-wordmark.png" alt="Agro and More" onerror="this.style.display='none'">
    <h1>Set new password</h1>
    <p>Choose a strong password for your Agro and More admin account.</p>
  </div>
  <div class="card-body">

    <!-- Reset form -->
    <div id="resetForm">
      <div class="alert err" id="resetErr"></div>
      <div class="field">
        <label>New password <span class="req">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="pw1" placeholder="Minimum 8 characters" oninput="checkStrength()">
          <button class="pw-toggle" onclick="togglePw('pw1')" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength"><div class="strength-fill" id="str-fill" style="width:0"></div></div>
        <div class="strength-lbl" id="str-lbl"></div>
      </div>
      <div class="field">
        <label>Confirm password <span class="req">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="pw2" placeholder="Repeat your new password">
          <button class="pw-toggle" onclick="togglePw('pw2')" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn" id="resetBtn" onclick="doReset()">
        <span class="btn-txt">Set new password</span>
        <div class="spinner"></div>
      </button>
      <div class="back"><a href="index.html">← Back to login</a></div>
    </div>

    <!-- Success state -->
    <div class="success-view" id="successView">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h3>Password updated!</h3>
      <p>Your password has been changed successfully. You can now log in with your new credentials.</p>
      <a href="index.html" class="btn" style="text-decoration:none">Go to login</a>
    </div>

  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const sb = createClient(
  'https://nqyutflqzjjueemirgzr.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xeXV0ZmxxempqdWVlbWlyZ3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzc1NDQsImV4cCI6MjA5Mjg1MzU0NH0.8UgCkfGIEZfpwtbx7ajg6IPJe6Dp4cbs2dahPIK5mYI'
);

// Supabase catches the token from the URL hash automatically
// The PASSWORD_RECOVERY event fires → session is set → user can updateUser
let recoveryReady = false;

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    recoveryReady = true;
  }
  if (event === 'SIGNED_IN' && session) {
    // Check if we arrived via password reset link (hash contains type=recovery)
    if (window.location.hash.includes('type=recovery') ||
        document.referrer.includes('index.html')) {
      recoveryReady = true;
    }
  }
});

// Also check immediately if we already have a recovery session
const { data: { session } } = await sb.auth.getSession();
if (session) recoveryReady = true;

window.checkStrength = function() {
  const pw = document.getElementById('pw1').value;
  const fill = document.getElementById('str-fill');
  const lbl  = document.getElementById('str-lbl');
  let score = 0;
  if (pw.length >= 8)  score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const configs = [
    { w:'0%',   bg:'transparent', t:'' },
    { w:'25%',  bg:'var(--rust)',  t:'Weak' },
    { w:'50%',  bg:'var(--orange)',t:'Fair' },
    { w:'75%',  bg:'var(--teal)',  t:'Good' },
    { w:'100%', bg:'var(--teal)',  t:'Strong ✓' },
  ];
  const c = configs[score];
  fill.style.width = c.w; fill.style.background = c.bg; lbl.textContent = c.t;
};

window.togglePw = function(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
};

window.doReset = async function() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const err = document.getElementById('resetErr');
  const btn = document.getElementById('resetBtn');

  err.classList.remove('show');
  if (!pw1 || pw1.length < 8) { err.textContent='Password must be at least 8 characters.'; err.classList.add('show'); return; }
  if (pw1 !== pw2) { err.textContent='Passwords do not match.'; err.classList.add('show'); return; }
  if (!recoveryReady) { err.textContent='Reset link has expired. Please request a new one.'; err.classList.add('show'); return; }

  btn.classList.add('loading'); btn.disabled = true;
  const { error } = await sb.auth.updateUser({ password: pw1 });
  btn.classList.remove('loading'); btn.disabled = false;

  if (error) { err.textContent = error.message; err.classList.add('show'); return; }

  document.getElementById('resetForm').style.display = 'none';
  document.getElementById('successView').style.display = 'block';
};
</script>
</body>
</html>
